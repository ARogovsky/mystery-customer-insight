services:
  db:
    image: postgres:16-alpine
    container_name: mci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mci
    ports:
      # 5434 на хосте (5432/5433 заняты другими сервисами)
      - '5434:5432'
    volumes:
      - mci_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres -d mci]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mci_pgdata:
