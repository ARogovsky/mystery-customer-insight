name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN нужен ТОЛЬКО при хранении подписей в ДРУГОМ
          # репозитории/организации. У нас подписи лежат в этом же репо (ветка
          # cla-signatures), поэтому достаточно встроенного GITHUB_TOKEN —
          # запись разрешена блоком permissions: contents: write выше.
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/ARogovsky/mystery-customer-insight/blob/main/CLA.md
          branch: cla-signatures
          allowlist: dependabot[bot]
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-allsigned-prcomment: All contributors have signed the CLA. Thank you!
